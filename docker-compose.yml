services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: istos
      POSTGRES_PASSWORD: istos
      POSTGRES_DB: istos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U istos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://istos:istos@db:5432/istos
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data

volumes:
  postgres_data:
